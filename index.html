<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫번째 아이디어</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1 class="idea-text">오늘도 힘내세요</h1>
        <button class="next-btn">다음 문장 보기</button>
    </div>
    <script>
        const sentences = [
            { text: "오늘도 힘내세요", color: "linear-gradient(135deg, #0052D4 0%, #4364F7 100%)" }, // 기본 파란색
            { text: "오늘도 해냈어요", color: "linear-gradient(135deg, #f1c40f 0%, #f39c12 100%)" }, // 노란색 그라데이션
            { text: "조금씩 나아지고 있어요", color: "linear-gradient(135deg, #e67e22 0%, #d35400 100%)" }, // 주황색 그라데이션
            { text: "이대로 계속 가 봅시다", color: "linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)" } // 초록색 그라데이션
        ];
        let currentIndex = 0;

        const textElement = document.querySelector('.idea-text');
        const nextBtn = document.querySelector('.next-btn');

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % sentences.length;

            // 애니메이션 재실행
            textElement.style.animation = 'none';
            void textElement.offsetWidth;
            textElement.style.animation = null;

            textElement.textContent = sentences[currentIndex].text;
            textElement.style.color = "#2c3e50"; // 텍스트 색상은 검정(다크 네이비)으로 고정
            nextBtn.style.background = sentences[currentIndex].color; // 버튼 색상 변경
        });
    </script>
</body>

</html>
